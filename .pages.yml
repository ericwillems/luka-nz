media: public/assets/img
content:
  - name: posts
    label: Posts
    type: collection
    path: content/posts
    view:
      fields: [ title, draft, date ]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: date, label: Date, type: date }
      - { name: draft, label: Draft, type: boolean }
      - { name: tags, label: Tags, type: string, list: true }
      - { name: body, label: Body, type: rich-text }
  - name: projects
    label: Projects
    type: collection
    path: content/projects
    view:
      fields: [ title, draft, date ]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: description, label: Description, type: string }
      - { name: draft, label: Draft, type: boolean }
      - { name: tags, label: Tags, type: string, list: true }
      - { name: body, label: Body, type: rich-text }
  - name: about
    label: About page
    type: file
    path: content/about/_index.md
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: draft, label: Draft, type: boolean }
      - { name: body, label: Body, type: rich-text }
  - name: menu
    label: Main Menu
    type: file
    path: data/menu/main.yaml
    fields:
      - name: items
        label: Menu Items
        type: object
        list: 
          collapsible:
            collapsed: true
            summary: "{name} ({index})"
        fields:
          - { name: name, label: Label, type: str }
          - name: url
            type: reference
            options:
              collection: projects
              value: "{path}"
              label: "{label}"
          - name: children
            label: Dropdown Items
            type: object
            list: 
              collapsible:
                collapsed: true
                summary: "{name} ({index})"
            fields:
              - { name: name, label: Label, type: str }
              - name: url
                type: reference
                options:
                  collection: projects
                  value: "{path}"
                  label: "{label}"
