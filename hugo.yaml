baseURL: "https://example.com/"
title: "Portfolio"
languageCode: "en-us"
theme: "PaperMod"

# Output formats
outputs:
  home:
    - HTML
    - JSON

# Pagination
paginate: 10

# Markup
markup:
  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: false
    hl_Lines: ""
    hl_inline: false
    lineAnchors: ""
    lineNos: false
    lineNumbersInTable: false
    noClasses: true
    noHl: false
    style: "github-dark"
    tabWidth: 4

# Taxonomies
taxonomies:
  category: categories
  tag: tags

# Menu
menu:
  main:
    - name: Home
      url: /
      weight: 1
    - name: Projects
      url: /projects/
      weight: 2
    - name: Posts
      url: /posts/
      weight: 3
    - name: About
      url: /about/
      weight: 4
